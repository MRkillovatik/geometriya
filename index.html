<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Построение треугольника</title>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>

<body>

<h2>Построить прямоугольный треугольник</h2>
<p>Дано: гипотенуза c и сумма катетов d</p>

<div id="ggb"></div>

<br>
<button onclick="nextStep()">Следующий шаг</button>
<button onclick="downStep()">Предыдущий шаг</button>

<p id="stepText">Нажмите кнопку чтобы начать построение</p>

<script>

let step = 0;

let applet = new GGBApplet({
  appName: "geometry",
  width: 800,
  height: 500,
  showToolBar: false,
  showMenuBar: false,
  showAlgebraInput: false
}, true);

window.addEventListener("load", () => {
  applet.inject("ggb");
});
function checker(){
if(step==1){
ggbApplet.evalCommand("C=(0,0)");
ggbApplet.evalCommand("B=(6,0)");
document.getElementById("stepText").innerText =
"1. Строим отрезок CB.";
}

else if(step==2){
ggbApplet.evalCommand("Segment(C,B)");
document.getElementById("stepText").innerText =
"2. Это часть суммы катетов.";
}

else if(step==3){
ggbApplet.evalCommand("K=(-3,0)");
ggbApplet.evalCommand("Segment(C,K)");
document.getElementById("stepText").innerText =
"3. Продлеваем BC и откладываем CK = AC.";
}

else if(step==4){
ggbApplet.evalCommand("A=(0,3)");
document.getElementById("stepText").innerText =
"4. Строим точку A так, чтобы ∠ACB = 90°.";
}

else if(step==5){
ggbApplet.evalCommand("Segment(A,C)");
ggbApplet.evalCommand("Segment(A,B)");
document.getElementById("stepText").innerText =
"5. Получаем прямоугольный треугольник ABC.";
}
function nextStep(){

step++;
checker();
}
function downStep(){
  step--;
  checker();
}

}

</script>

</body>
</html>
