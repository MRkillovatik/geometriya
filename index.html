<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Пошаговое построение</title>

<script src="https://www.geogebra.org/apps/deployggb.js"></script>

</head>
<body>

<h2>Пошаговое построение треугольника</h2>

<div id="ggb-element"></div>

<br>
<button onclick="nextStep()">Следующий шаг</button>

<p id="stepText">Шаг 0: нажмите кнопку</p>

<script>

var step = 0;

var applet = new GGBApplet({
    appName: "geometry",
    width: 800,
    height: 500,
    showToolBar: true,
    showAlgebraInput: false,
    showMenuBar: false
}, true);

window.addEventListener("load", function () {
    applet.inject('ggb-element');
});


function nextStep(){

    step++;

    if(step == 1){
        ggbApplet.evalCommand("A=(0,0)");
        document.getElementById("stepText").innerText =
        "Шаг 1: построили точку A";
    }

    else if(step == 2){
        ggbApplet.evalCommand("B=(4,0)");
        document.getElementById("stepText").innerText =
        "Шаг 2: построили точку B";
    }

    else if(step == 3){
        ggbApplet.evalCommand("Segment(A,B)");
        document.getElementById("stepText").innerText =
        "Шаг 3: провели отрезок AB";
    }

    else if(step == 4){
        ggbApplet.evalCommand("C=(2,3)");
        document.getElementById("stepText").innerText =
        "Шаг 4: построили точку C";
    }

    else if(step == 5){
        ggbApplet.evalCommand("Segment(A,C)");
        ggbApplet.evalCommand("Segment(B,C)");
        document.getElementById("stepText").innerText =
        "Шаг 5: получили треугольник ABC";
    }

}

</script>

</body>
</html>
